name: Scrape Postcrossing & Deploy Dashboard

on:
  schedule:
    # Run twice a day: 06:00 UTC and 18:00 UTC
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:  # Allow manual trigger from the Actions UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits back to the repo

    steps:
      # 1. Check out the repository (full history so we can push)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the scraper — appends a new record to docs/history.csv & .json
      - name: Run scraper
        run: python scraper.py

      # 5. Update TimeData.csv from live Postcrossing site (2x daily)
      - name: Update TimeData.csv from live site
        run: python update_timedata.py

      # 6. Upload TimeData.csv to Hugging Face dataset
      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj='docs/TimeData.csv',
              path_in_repo='TimeData.csv',
              repo_id='kamjke/postcrossing-daily-growth',
              repo_type='dataset',
              token='${{ secrets.HF_TOKEN }}',
              commit_message='Automated update from GitHub Actions'
          )
          print('✅ Uploaded to Hugging Face')
          "

      # 7. Build the dashboard — regenerates docs/index.html
      - name: Build dashboard
        run: python build_dashboard.py

      # 8. Stage all changes in docs/
      - name: Stage changes
        run: git add docs/

      # 9. Commit and push only when there are staged changes
      - name: Commit and push (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "bot@github.com"
          if ! git diff --staged --quiet; then
            git commit -m "chore: update stats $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No changes — skipping commit."
          fi
