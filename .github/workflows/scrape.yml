name: Scrape Postcrossing & Deploy Dashboard

on:
  schedule:
    # Run once every hour at minute 0
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual trigger from the Actions UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits back to the repo

    steps:
      # 1. Check out the repository (full history so we can push)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the scraper — appends a new record to docs/history.csv & .json
      - name: Run scraper
        run: python scraper.py

      # 5. Convert TimeData.csv → received_report.csv (historical growth data)
      #    Only runs if docs/TimeData.csv exists in the repo
      - name: Convert TimeData.csv to received_report.csv
        run: |
          if [ -f docs/TimeData.csv ]; then
            python convert_timedata.py
          else
            echo "docs/TimeData.csv not found — skipping conversion"
          fi

      # 6. Build the dashboard — regenerates docs/index.html
      - name: Build dashboard
        run: python build_dashboard.py

      # 6. Stage all changes in docs/
      - name: Stage changes
        run: git add docs/

      # 7. Commit and push only when there are staged changes
      - name: Commit and push (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "bot@github.com"
          if ! git diff --staged --quiet; then
            git commit -m "chore: update stats $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No changes — skipping commit."
          fi
